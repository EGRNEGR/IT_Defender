<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI-Privacy Sentinel | Адрес заблокирован</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #081118;
        --panel: rgba(7, 19, 29, 0.82);
        --panel-border: rgba(255, 255, 255, 0.12);
        --text: #f4f7f9;
        --muted: #9db0bb;
        --danger: #ff6b57;
        --danger-strong: #ff9a7a;
        --safe: #dfe7eb;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 107, 87, 0.24), transparent 33%),
          radial-gradient(circle at bottom right, rgba(12, 74, 110, 0.38), transparent 32%),
          linear-gradient(180deg, #061018 0%, #03070b 100%);
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .shell {
        width: min(920px, 100%);
        border-radius: 32px;
        border: 1px solid var(--panel-border);
        background: var(--panel);
        backdrop-filter: blur(28px);
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.42);
        overflow: hidden;
      }

      .hero {
        padding: 30px 30px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--danger-strong);
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(34px, 5vw, 56px);
        line-height: 0.95;
      }

      .summary {
        max-width: 720px;
        font-size: 16px;
        line-height: 1.6;
        color: var(--muted);
      }

      .url-block {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-family: ui-monospace, SFMono-Regular, monospace;
        color: #ffe8e2;
        overflow-wrap: anywhere;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 22px;
        padding: 24px 30px 30px;
      }

      .panel {
        padding: 20px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .panel h2 {
        margin: 0 0 14px;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .detail-card {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .detail-card + .detail-card {
        margin-top: 12px;
      }

      .detail-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      .detail-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .actions {
        display: grid;
        gap: 12px;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 16px;
        padding: 14px 16px;
        cursor: pointer;
        font: 600 14px/1 "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      .primary { background: var(--safe); color: #061018; }
      .secondary { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
      .danger { background: rgba(255,107,87,0.12); color: #ffd9cf; border: 1px solid rgba(255,107,87,0.24); }

      textarea {
        width: 100%;
        min-height: 110px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.04);
        color: var(--text);
        padding: 12px 14px;
        resize: vertical;
        font: 500 14px/1.5 "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      @media (max-width: 760px) {
        .grid { grid-template-columns: 1fr; }
        .hero, .grid { padding-left: 20px; padding-right: 20px; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="kicker">L1 Threat Intel Gate</div>
        <h1 id="risk-title">Переход к подозрительному адресу заблокирован</h1>
        <p id="risk-summary" class="summary"></p>
        <div id="blocked-url" class="url-block"></div>
      </section>

      <section class="grid">
        <section class="panel">
          <h2>Причина блокировки</h2>
          <div id="details"></div>
        </section>

        <aside class="panel">
          <h2>Безопасные действия</h2>
          <div class="actions">
            <button id="go-back" class="primary">Назад</button>
            <button id="copy-url" class="secondary">Скопировать URL</button>
            <button id="report-fp" class="secondary">Сообщить о ложном срабатывании</button>
            <button id="continue-anyway" class="danger">Всё равно продолжить</button>
          </div>
          <div id="confirm-wrap" hidden style="margin-top:16px;">
            <h2>Подтверждение обхода</h2>
            <textarea id="override-reason" placeholder="Требуется для аудита. Например: внутренняя проверка ИБ."></textarea>
            <div style="margin-top:12px;">
              <button id="confirm-continue" class="danger">Подтвердить и продолжить</button>
            </div>
          </div>
        </aside>
      </section>
    </main>
    <script type="module" src="src/ui/warning.js"></script>
  </body>
</html>
